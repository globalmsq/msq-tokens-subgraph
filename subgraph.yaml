specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # MSQ - Standard ERC-20 Token
  - kind: ethereum/contract
    name: MSQ
    network: matic
    source:
      address: "0x6A8Ec2d9BfBDD20A7F5A4E89D640F7E7cebA4499"
      abi: ERC20
      startBlock: 28385214
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - TokenAccount
        - Transfer
        - DailySnapshot
        - HourlySnapshot
        - AccountStats
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/token.ts

